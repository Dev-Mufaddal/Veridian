{% extends "base.html" %}

{% block title %}Add Product - Admin{% endblock %}

{% block content %}
<div class="form-container">
    <div class="form-box">
        <h2>Add New Product</h2>
        <p class="form-subtitle">Create a new product for your store</p>

        {% if error %}
            <div class="alert alert-error">
                <span class="alert-icon">✕</span>
                {{ error }}
            </div>
        {% endif %}

        <form method="POST" class="product-form" enctype="multipart/form-data">
            <div class="form-group">
                <label for="name">Product Name *</label>
                <input 
                    type="text" 
                    id="name" 
                    name="name" 
                    placeholder="Enter product name"
                    required
                >
            </div>

            <div class="form-group">
                <label for="description">Description</label>
                <textarea 
                    id="description" 
                    name="description" 
                    placeholder="Enter product description"
                    rows="5"
                ></textarea>
            </div>

            <div class="form-group">
                <label for="image">Product Image (PNG, JPG, GIF, WebP - Max 5MB)</label>
                <input 
                    type="file" 
                    id="image" 
                    name="image" 
                    accept=".png,.jpg,.jpeg,.gif,.webp"
                    class="file-input"
                >
                <small style="color: #666; margin-top: 0.5rem; display: block;">Image will be automatically resized to 800x800px and optimized</small>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="price">Price (₹) *</label>
                    <input 
                        type="number" 
                        id="price" 
                        name="price" 
                        placeholder="0.00"
                        step="0.01"
                        min="0"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="stock">Stock Quantity *</label>
                    <input 
                        type="number" 
                        id="stock" 
                        name="stock" 
                        placeholder="0"
                        min="0"
                        required
                    >
                </div>
            </div>

            <div class="form-buttons">
                <button type="submit" class="btn btn-primary">Add Product</button>
                <a href="{{ url_for('admin_products') }}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>

<style>
.form-container {
    display: flex;
    justify-content: center;
    min-height: calc(100vh - 200px);
    padding: 2rem 0;
}

.form-box {
    background: white;
    padding: 2.5rem;
    border-radius: 8px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    width: 100%;
    max-width: 600px;
}

.form-box h2 {
    color: #333;
    margin-bottom: 0.5rem;
    text-align: center;
}

.form-subtitle {
    text-align: center;
    color: #666;
    margin-bottom: 2rem;
}

.product-form {
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
}

.form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
}

.form-group {
    display: flex;
    flex-direction: column;
}

.form-group label {
    margin-bottom: 0.5rem;
    font-weight: 600;
    color: #333;
}

.form-group input,
.form-group textarea {
    padding: 0.75rem;
    border: 2px solid #ddd;
    border-radius: 4px;
    font-size: 1rem;
    font-family: inherit;
}

.form-group input:focus,
.form-group textarea:focus {
    outline: none;
    border-color: #4CAF50;
    box-shadow: 0 0 5px rgba(76, 175, 80, 0.3);
}

.form-buttons {
    display: flex;
    gap: 1rem;
    margin-top: 1rem;
}

.form-buttons .btn {
    flex: 1;
    padding: 0.75rem;
}

@media (max-width: 768px) {
    .form-box {
        padding: 1.5rem;
    }

    .form-row {
        grid-template-columns: 1fr;
    }

    .form-buttons {
        flex-direction: column;
    }
}
</style>
{% endblock %}
